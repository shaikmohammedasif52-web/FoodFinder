<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Restaurants</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#f5f5f5;
    padding:30px;
}

h2{
    margin-bottom:15px;
}

/* ✅ FILTER BUTTONS */
.filters{
    margin-bottom:20px;
}

.filters button{
    border:none;
    padding:8px 18px;
    margin-right:10px;
    border-radius:20px;
    cursor:pointer;
    background:#eee;
    transition:.2s;
}

.filters button.active{
    background:#ff4d4d;
    color:white;
}

/* ✅ GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* ✅ CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:.3s;
}

.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.meta{
    font-size:.9rem;
    color:#777;
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.rating{
    background:#28a745;
    color:white;
    padding:4px 10px;
    border-radius:8px;
    font-size:.8rem;
}

.back{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    color:#ff4d4d;
}
</style>
</head>

<body>

<h2>📍 Restaurants Near You</h2>

<!-- ✅ FILTERS -->
<div class="filters">
    <button class="active" onclick="filter('All', this)">All</button>
    <button onclick="filter('Biryani', this)">Biryani</button>
    <button onclick="filter('Meals', this)">Meals</button>
    <button onclick="filter('Desserts', this)">Desserts</button>
</div>

<!-- ✅ CONTAINER -->
<div id="restaurantsContainer" class="grid"></div>

<a class="back" href="/home">⬅ Back Home</a>

<script>
let allRestaurants = [];

/* ✅ GET LOCATION + FETCH */
navigator.geolocation.getCurrentPosition((position)=>{

    fetch("/nearby", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
        })
    })
    .then(res => res.json())
    .then(data => {
        allRestaurants = data;
        render(data);
    });

});

/* ✅ RENDER CARDS */
function render(list){

    const container = document.getElementById("restaurantsContainer");
    container.innerHTML = "";

    list.forEach(r => {

        container.innerHTML += `
            <div class="card">
                <img src="/static/images/${r.image}">
                <div class="card-body">
                    <h4>${r.name}</h4>
                    <div class="meta">
                        <span class="rating">⭐ ${r.rating}</span>
                        <span>📍 ${r.distance} km</span>
                    </div>
                </div>
            </div>
        `;
    });

}

/* ✅ FILTER LOGIC */
function filter(category, btn){

    document.querySelectorAll(".filters button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    if(category === "All"){
        render(allRestaurants);
        return;
    }

    const filtered = allRestaurants.filter(r => r.category === category);
    render(filtered);
}
</script>

</body>
</html>
