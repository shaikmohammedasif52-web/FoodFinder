<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodFinder Auth</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.food span{
position:absolute;
font-size:35px;
animation:floatFood 18s linear infinite;
opacity:0.7;
}

.food span:nth-child(1){left:8%;animation-duration:2s;}
.food span:nth-child(2){left:22%;animation-duration:3s;}
.food span:nth-child(3){left:38%;animation-duration:4s;}
.food span:nth-child(4){left:55%;animation-duration:5s;}
.food span:nth-child(5){left:72%;animation-duration:3s;}
.food span:nth-child(6){left:88%;animation-duration:2s;}

@keyframes floatFood{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
20%{opacity:0.8;}
100%{transform:translateY(-200px) rotate(360deg);opacity:0;}
}

.glow{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,122,0,0.25),transparent);
border-radius:50%;
filter:blur(120px);
animation:glowMove 8s infinite alternate;
}

@keyframes glowMove{
0%{transform:translate(-200px,-100px);}
100%{transform:translate(200px,150px);}
}

.card{
width:420px;
padding:40px;
background:rgba(255,255,255,0.95);
border-radius:20px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:relative;
z-index:10;
}

h1{color:#ff7a00;margin-bottom:5px;}
.subtitle{color:#666;margin-bottom:20px;}

.toggle{
display:flex;
background:#eee;
border-radius:10px;
margin-bottom:20px;
}

.toggle div{
flex:1;
padding:10px;
cursor:pointer;
font-weight:bold;
}

.active{
background:white;
color:#ff7a00;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#ff7a00;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#e86f00;
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(255,122,0,0.4);
}

.hidden{display:none}

#msg{margin-top:10px;font-weight:bold;}
#timer{margin-top:8px;color:#ff7a00;font-weight:bold;}
#resend{margin-top:8px;color:blue;cursor:pointer;display:none;}
</style>
</head>

<body>

<div class="glow"></div>

<div class="food">
<span>🍕</span>
<span>🍔</span>
<span>🍜</span>
<span>🍩</span>
<span>🍟</span>
<span>🥗</span>
</div>

<div class="card">

<h1>FoodFinder</h1>
<div class="subtitle">Smart Restaurant Discovery</div>

<div class="toggle">
<div id="loginTab" class="active" onclick="switchTab('login')">Login</div>
<div id="signupTab" onclick="switchTab('signup')">Sign Up</div>
</div>

<input type="email" id="email" placeholder="Enter your email">

<div id="otpBox" class="hidden">
<input type="text" id="otp" maxlength="6" placeholder="Enter OTP">
<div id="timer"></div>
<div id="resend" onclick="resendOTP()">Resend OTP</div>
</div>

<button onclick="handleAction()">Continue</button>

<div id="msg"></div>

</div>

<script>

let mode="login"
let otpSent=false
let countdown
let timeLeft=120

function switchTab(tab){
mode=tab
document.getElementById("loginTab").classList.remove("active")
document.getElementById("signupTab").classList.remove("active")
document.getElementById(tab+"Tab").classList.add("active")
otpSent=false
document.getElementById("otpBox").classList.add("hidden")
document.getElementById("msg").innerHTML=""
document.getElementById("timer").innerHTML=""
document.getElementById("resend").style.display="none"
clearInterval(countdown)
}

function startTimer(){
clearInterval(countdown)
timeLeft=120
document.getElementById("timer").innerHTML="⏳ OTP expires in 120s"

countdown=setInterval(()=>{
timeLeft--
document.getElementById("timer").innerHTML="⏳ OTP expires in "+timeLeft+"s"

if(timeLeft<=0){
clearInterval(countdown)
document.getElementById("timer").innerHTML="❌ OTP expired"
document.getElementById("resend").style.display="block"
}
},1000)
}

function handleAction(){

let email=document.getElementById("email").value
let otp=document.getElementById("otp").value

if(email.length<5){
alert("Enter valid email")
return
}

if(!otpSent){

otpSent = true   // ✅ FIXED (prevent overwrite)

fetch("/get_otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email:email})
})
.then(res=>res.json())
.then(data=>{

document.getElementById("otpBox").classList.remove("hidden")
document.getElementById("msg").innerHTML="OTP sent to your email"
startTimer()

})

}

else{

if(otp.length!==6){
alert("Enter valid 6 digit OTP")
return
}

fetch("/verify_otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({otp:otp})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){

fetch("/profile_check")
.then(res=>res.json())
.then(result=>{

if(result.status==="new"){
window.location="/user_details"
}else{
window.location="/home"
}

})

}
else{
document.getElementById("msg").innerHTML="Invalid or expired OTP"
}

})

}

}

function resendOTP(){
document.getElementById("resend").style.display="none"
otpSent=false
handleAction()
}

</script>

</body>
</html>
